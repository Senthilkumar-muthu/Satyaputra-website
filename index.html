<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SATYAPUTRA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --gold-hi:#f6dfa0;
    --gold:#c99a3f;
    --gold-lo:#6f4f18;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:#04070d;
    font-family:'Cinzel', serif;
    overflow-x:hidden;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important;}
  }

  .hero{
    position:relative;
    width:100%;
    min-height:100vh;
    overflow:hidden;
    background:#04070d;
  }

  .hero img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:50% 50%;
  }

  /* SATYAPUTRA — sits in the blue sky band */
  .title{
    position:absolute;
    top:16%;
    left:0; right:0;
    z-index:2;
    text-align:center;
    padding:0 1.2rem;
  }

  h1.carved{
    font-family:'Cinzel Decorative', serif;
    font-weight:900;
    font-size:clamp(2.1rem, 9vw, 4.4rem);
    letter-spacing:0.12em;
    line-height:1;
    background:linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 50%, var(--gold-lo) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:
      0 1px 0 rgba(255,240,200,0.3),
      0 2px 2px rgba(0,0,0,0.6),
      0 6px 18px rgba(0,0,0,0.5);
    position:relative;
    display:inline-block;
  }
  h1.carved::after{
    content:'SATYAPUTRA';
    position:absolute;
    inset:0;
    color:transparent;
    -webkit-text-stroke:1px rgba(0,0,0,0.5);
    z-index:-1;
    transform:translate(1px,2px);
  }

  /* COMING SOON — sits in the black ground band */
  .mark{
    position:absolute;
    bottom:6%;
    left:0; right:0;
    z-index:2;
    text-align:center;
  }

  .inscription{
    display:inline-flex;
    align-items:center;
    gap:0.9rem;
    font-family:'Cinzel', serif;
    font-size:clamp(0.62rem, 1.9vw, 0.85rem);
    letter-spacing:0.48em;
    text-transform:uppercase;
    background:linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 55%, var(--gold-lo) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,0.7));
    animation:emberPulse 5s ease-in-out infinite;
  }
  .inscription::before,
  .inscription::after{
    content:'';
    width:5px;height:5px;
    background:var(--gold);
    transform:rotate(45deg);
    flex-shrink:0;
  }
  @keyframes emberPulse{
    0%,100%{opacity:1;}
    50%{opacity:0.68;}
  }
</style>
</head>
